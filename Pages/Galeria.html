<body>


    <header class="encabezado">

        <img src="../src/1.png" alt="Error" class="Logo">
        <img src="../src/Capsule-Store.png" alt="Error" class="NombreLogo">
        <nav class="menu">
            <a href="../index.html">Inicio</a>
            <a href="../Pages/Galeria.html">Galeria</a>

            <a href="">Soporte</a>
        </nav>

    </header>



    <div class="Intermedio">
        <img src="../src/Intermedio/4.gif" alt="Error">

    <main>
        <section class="Galeria">

            <div class="img1">
                <img src="../src/Galeria/1.jpg" alt="Error">

            <div class="img2">

            <div class="img3">

            </div>

            <div class="img4">
                <img src="../src/Galeria/4.jpg" alt="Error">

            <div class="img5">

            </div>

            <div class="img6">
                <img src="../src/Galeria/6.jpg" alt="Error">

            </div>

        </section>

        <section class="contacto">

            <h1>Nuestra Ubicación</h1>


            <iframe src="https://www.google.com/maps?q=Lomas+de+Zamora,+Buenos+Aires,+Argentina&output=embed"
                frameborder="0" allowfullscreen="" loading="lazy" class="mapa">
            </iframe>

            <h1>Contacta con nosotros:</h1>

            <form>

                <input type="text" placeholder="Nombre" required>

                <input type="email" placeholder="Correo electrónico" required>

                <textarea placeholder="Mensaje" required></textarea>

                <button type="submit">Enviar</button>

            </form>

        </section>

    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"

    <footer class="footer">


        <img src="../src/1.png" alt="Error" class="LogoFooter">

        <div class="Redes">
            <a href=""><img src="../src/Pie/Instagram.png" alt="Error" class="Instagram"></a>
            <a href=""><img src="../src/Pie/Facebook.png" alt="Error" class="Instagram"></a>
            <a href=""><img src="../src/Pie/X.png" alt="Error" class="Instagram"></a>

        <div class="Cosas">
